<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運転性格診断テスト (50問)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>🚛 運転性格診断テスト</h1>
        <p>現場のための安全運転プロファイリング（全50問）</p>
    </header>

    <div id="quiz-container"></div>

    <div id="result-area">
        <div class="result-header">
            <h2>診断結果</h2>
            <div class="score-display"><span id="total-score">0</span>点</div>
            <div class="result-title" id="result-status">判定中...</div>
            <div class="result-desc" id="result-commentary"></div>
        </div>

        <div class="breakdown-title">📊 回答内訳</div>
        <div id="breakdown-container"></div>
    </div>
</div>

<script href="quizData.js"></script>
<script href="app.js"></script>
</body>
</html>
